<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI | Coming Soon</title>
    <style>
        /* =========================================
           1. CORE VARIABLES & RESET
           ========================================= */
        :root {
            --primary: #00D4FF;      /* Dynamic */
            --secondary: #0066FF;    /* Dynamic */
            --bg-color: #0a0a12;     /* Dynamic */
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --transition-speed: 0.5s;
            --cursor-size: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* =========================================
           2. ANIMATED BACKGROUND (CANVAS)
           ========================================= */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Floating CSS Orbs (Complement Canvas) */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }
        .orb-1 { top: -10%; left: -10%; width: 30vw; height: 30vw; background: var(--primary); animation-delay: 0s; }
        .orb-2 { bottom: -10%; right: -10%; width: 40vw; height: 40vw; background: var(--secondary); animation-delay: -5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        /* =========================================
           3. LAYOUT & TYPOGRAPHY
           ========================================= */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        /* Header & Theme Switcher */
        header {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 100;
        }

        .theme-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all var(--transition-speed) ease;
            backdrop-filter: blur(10px);
            opacity: 0.7;
        }

        .theme-btn:hover, .theme-btn.active {
            opacity: 1;
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(var(--primary-rgb), 0.3);
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: 10vh;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards;
        }

        .hero-sub {
            font-size: clamp(1.2rem, 3vw, 2rem);
            color: var(--text-muted);
            max-width: 800px;
            margin-bottom: 3rem;
            line-height: 1.6;
            opacity: 0;
            animation: fadeInUp 1s ease 0.2s forwards;
        }

        .hero-sub span {
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Countdown Card */
        .countdown-container {
            display: flex;
            gap: 2rem;
            margin-bottom: 4rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .time-box {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 24px;
            min-width: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .time-box:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .time-number {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .time-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        /* Footer / Links */
        .footer-links {
            display: flex;
            gap: 1.5rem;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.3s;
            position: relative;
        }

        .footer-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--primary);
            transition: width 0.3s;
        }

        .footer-links a:hover {
            color: var(--primary);
        }
        .footer-links a:hover::after {
            width: 100%;
        }

        /* =========================================
           4. CUSTOM CURSOR
           ========================================= */
        #cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--cursor-size);
            height: var(--cursor-size);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            /* Default style */
            filter: blur(5px);
            mix-blend-mode: screen;
        }

        /* Inner core of cursor */
        #cursor::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: var(--text-main);
            border-radius: 50%;
        }

        /* Trailing particles attached to cursor */
        .cursor-particle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0;
        }

        /* Hover Effect for Buttons */
        .interactive:hover + #cursor, #cursor.hovered {
            --cursor-size: 60px; /* Grow */
        }
        .interactive:hover + #cursor::before, #cursor.hovered::before {
            background: var(--primary);
            width: 10px;
            height: 10px;
        }
        .interactive:hover + #cursor .cursor-particle, #cursor.hovered .cursor-particle {
            opacity: 0.8;
        }

        /* =========================================
           5. LOADING ANIMATION
           ========================================= */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================
           6. RESPONSIVE ADJUSTMENTS
           ========================================= */
        @media (max-width: 768px) {
            .countdown-container {
                gap: 1rem;
            }
            .time-box {
                min-width: 70px;
                padding: 1.5rem 0.8rem;
                border-radius: 16px;
            }
            .time-number {
                font-size: 2.5rem;
            }
            header {
                top: 1rem;
                right: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <!-- Custom Cursor Element -->
    <div id="cursor">
        <div class="cursor-particle"></div>
    </div>

    <!-- Canvas for Neural Network Effect -->
    <canvas id="bg-canvas"></canvas>

    <!-- Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        
        <!-- Theme Switcher -->
        <header>
            <button class="theme-btn" onclick="setTheme('blue')" style="color: #00D4FF">Cyber Blue</button>
            <button class="theme-btn" onclick="setTheme('purple')" style="color: #B026FF">Neon Purple</button>
            <button class="theme-btn" onclick="setTheme('green')" style="color: #00FF88">Matrix Green</button>
        </header>

        <!-- Hero Section -->
        <section class="hero">
            <h1>COMING SOON</h1>
            <p class="hero-sub">
                The future of AI is moving to your machine. 
                Experience <span>Local AI</span> with <span>Open Weights</span>, 
                <span>Zero Latency</span>, and total privacy.
            </p>

            <!-- Countdown -->
            <div class="countdown-container">
                <div class="time-box">
                    <span class="time-number" id="days">00</span>
                    <span class="time-label">Days</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="hours">00</span>
                    <span class="time-label">Hours</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="minutes">00</span>
                    <span class="time-label">Minutes</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="seconds">00</span>
                    <span class="time-label">Seconds</span>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer-links">
                <a href="#" class="interactive">Discord Community</a>
                <a href="#" class="interactive">Twitter / X</a>
                <a href="#" class="interactive">GitHub</a>
            </div>
        </section>
    </div>

    <script>
        /* =========================================
           1. THEME MANAGEMENT
           ========================================= */
        const themes = {
            blue: {
                primary: "#00D4FF",
                secondary: "#0066FF",
                bg: "#0a0a12"
            },
            purple: {
                primary: "#B026FF",
                secondary: "#FF00C8",
                bg: "#1a0b2e"
            },
            green: {
                primary: "#00FF88",
                secondary: "#00CC55",
                bg: "#050a05"
            }
        };

        function setTheme(themeName) {
            const root = document.documentElement;
            const t = themes[themeName];
            
            // Update CSS Variables
            root.style.setProperty('--primary', t.primary);
            root.style.setProperty('--secondary', t.secondary);
            root.style.setProperty('--bg-color', t.bg);

            // Update Orb colors dynamically
            const orb1 = document.querySelector('.orb-1');
            const orb2 = document.querySelector('.orb-2');
            orb1.style.background = t.secondary;
            orb2.style.background = t.primary;

            // Save to local storage
            localStorage.setItem('preferredTheme', themeName);
        }

        // Load saved theme or default
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('preferredTheme') || 'blue';
            setTheme(savedTheme);
        });

        /* =========================================
           2. COUNTDOWN LOGIC
           ========================================= */
        function updateCountdown() {
            // Set to Jan 1st of next year
            const now = new Date();
            let nextYear = now.getFullYear() + 1;
            let targetDate = new Date(nextYear, 0, 1).getTime(); // Jan 1st
            
            // If today is already after Jan 1st, count down to next Jan
            if (now.getMonth() > 0) {
                targetDate += 365 * 24 * 60 * 60 * 1000;
            }

            const diff = targetDate - now.getTime();

            if (diff <= 0) {
                document.getElementById('days').innerText = "00";
                // You could add logic here to reset to next year or show "LIVE"
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d < 10 ? '0' + d : d;
            document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('minutes').innerText = m < 10 ? '0' + m : m;
            document.getElementById('seconds').innerText = s < 10 ? '0' + s : s;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown(); // Run immediately

        /* =========================================
           3. NEURAL NETWORK BACKGROUND (CANVAS)
           ========================================= */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Particle Class
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 1; // Velocity X
                this.vy = (Math.random() - 0.5) * 1; // Velocity Y
                this.size = Math.random() * 2 + 1;
                this.color = Math.random() > 0.5 ? '#888' : '#444'; // Greyish for background
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off edges
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        // Initialize Particles
        for (let i = 0; i < 60; i++) {
            particles.push(new Particle());
        }

        // Animate Particles
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Update & Draw Particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Draw Connections (Neural Network effect)
            particles.forEach((a, index) => {
                particles.slice(index + 1).forEach(b => {
                    const distance = ((b.x - a.x) ** 2) + ((b.y - a.y) ** 2);
                    if (distance < 15000) { // If close enough
                        ctx.strokeStyle = `rgba(100, 100, 100, ${0.1 * (1 - distance/15000)})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                        ctx.stroke();
                    }
                });
            });

            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        /* =========================================
           4. CUSTOM CURSOR LOGIC
           ========================================= */
        const cursor = document.getElementById('cursor');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0; // For smooth interpolation
        let cursorId = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // Add a new particle trail at cursor position
            const particle = document.createElement('div');
            particle.className = 'cursor-particle';
            particle.style.top = `${mouseY}px`;
            particle.style.left = `${mouseX}px`;
            
            // Randomize particle size and fade time
            particle.style.width = `${Math.random() * 20 + 10}px`;
            particle.style.height = `${Math.random() * 20 + 10}px`;
            cursor.appendChild(particle);
            
            // Clean up old particles to prevent memory leaks
            if (cursor.children.length > 10) {
                const oldParticle = cursor.lastElementChild;
                if(oldParticle !== particle) {
                    oldParticle.style.opacity = '0';
                    setTimeout(() => oldParticle.remove(), 200);
                }
            }
        });

        // Animation Loop for Cursor
        function cursorLoop() {
            // Lerp (Linear Interpolation) for smooth movement
            cursorX += (mouseX - cursorX) * 0.15;
            cursorY += (mouseY - cursorY) * 0.15;
            
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';

            // Simple fade out for particles attached to cursor (CSS animation handles most, but JS adds chaos)
            const particle = cursor.querySelector('.cursor-particle');
            if (particle) {
                particle.style.transition = 'opacity 1s ease-out, transform 0.5s ease-out';
                particle.style.transform = `translate(-50%, -50%) scale(${Math.random() * 0.5 + 0.5})`;
                particle.style.opacity = Math.random() * 0.8;
            }

            requestAnimationFrame(cursorLoop);
        }
        cursorLoop();

        // Add hover classes to elements
        const interactables = document.querySelectorAll('a, button, .time-box');
        interactables.forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.classList.add('hovered');
                cursorId = requestAnimationFrame(() => {
                    cursor.style.transition = 'none';
                    cursor.style.left = mouseX + 'px';
                    cursor.style.top = mouseY + 'px';
                });
            });
            el.addEventListener('mouseleave', () => {
                cursor.classList.remove('hovered');
                cancelAnimationFrame(cursorId);
            });
        });

        /* =========================================
           5. UTILITY: LOADER & FADE IN
           ========================================= */
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            // Give content a split second to render fully
            setTimeout(() => {
                loader.style.opacity = 0;
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 800);
            }, 500);
        });

        // Fade in elements on scroll (simple observer)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = 1;
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        });

        document.querySelectorAll('.time-box').forEach(box => {
            box.style.opacity = '0';
            box.style.transform = 'translateY(20px)';
            box.style.transition = 'all 0.8s ease';
            observer.observe(box);
        });

    </script>
</body>
</html>
